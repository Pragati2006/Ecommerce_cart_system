<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product List</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body onload="loadCart()">
  <header>
    <h1>Modern Store | Products</h1>
    <nav><a href="/cart">Cart</a> | <a href="/checkout">Checkout</a></nav>
  </header>
  <main>
    <div id="owner-wrap">
      <label for="ownerId">Owner ID (Session):</label>
      <input id="ownerId" value="guest_default" onchange="loadCart()">
    </div>

    <section class="grid">
      {% for p in products %}
      <article class="card">
        <h3>{{ p.name }}</h3>
        <p class="stock">Category: <span class="badge badge-info">{{ p.category }}</span></p>
        <p class="price">${{ "%.2f"|format(p.price_usd) }}</p>
        <p class="stock">Availability: 
          {% if p.in_stock %}
            <span class="badge badge-success">{{ p.available_quantity }} units left</span>
          {% else %}
            <span class="badge badge-danger">Out of stock</span>
          {% endif %}
        </p>
        <div style="flex-grow: 1;"></div>
        <label>Quantity: <input type="number" id="qty-{{ p.product_id }}" min="1" value="1"></label>
        <button onclick="addToCart('{{ p.product_id }}')" {% if not p.in_stock %}disabled style="filter:grayscale(1)"{% endif %}>
          {% if p.in_stock %}Add to cart{% else %}Unavailable{% endif %}
        </button>
      </article>
      {% endfor %}
    </section>
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
